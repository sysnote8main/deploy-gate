name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o dist/deploy-gate \
            ./cmd/deploy-gate

      - name: Archive
        run: |
          tar -C dist -czf dist/deploy-gate_linux_amd64.tar.gz deploy-gate

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/deploy-gate_linux_amd64.tar.gz
