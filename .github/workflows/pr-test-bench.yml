name: PR - Test & Benchmark

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests with coverage
        run: |
          go test -v -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out > coverage_summary.txt
          COVERAGE=$(grep 'total:' coverage_summary.txt | awk '{print $3}')
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          cat coverage_summary.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage_summary.txt

      - name: Comment coverage on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage_summary.txt', 'utf8');
            const totalMatch = coverage.match(
              /total:\s+\(statements\)\s+(\d+\.\d+%)/
            );
            const total = totalMatch ? totalMatch[1] : 'N/A';
            let body = `## 📊 Test Coverage\n\n`;
            body += `**Total Coverage: ${total}**\n\n`;
            body += `<details>\n<summary>Coverage Details</summary>\n\n`;
            body += '```\n' + coverage + '```\n';
            body += `</details>\n`;

            const { data: comments } =
              await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

            const botComment = comments.find(
              (c) =>
                c.user.type === 'Bot' &&
                c.body.includes('📊 Test Coverage')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        pkg:
          - internal/signature
          - internal/deploy
          - internal/webhook
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run benchmark (${{ matrix.pkg }})
        run: |
          PKG=$(echo "${{ matrix.pkg }}" | tr '/' '-')
          go test -bench=. -benchmem -count=3 -json \
            -run=^$ ./${{ matrix.pkg }}/... > "bench-${PKG}.json"

      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.pkg }}
          path: bench-*.json

  report:
    runs-on: ubuntu-latest
    needs: benchmark
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          merge-multiple: true
          path: ./benchmarks

      - name: Download previous benchmark results
        uses: actions/cache@v4
        with:
          path: ./bench_old.json
          key: benchmark-${{ github.base_ref }}-${{ github.event.pull_request.head.sha }}
          restore-keys: |
            benchmark-${{ github.base_ref }}-
            benchmark-main-

      - name: Generate benchmark report
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import glob

          def parse_benchmarks(filename):
              results = {}
              if not os.path.exists(filename):
                  return results
              with open(filename, 'r') as f:
                  for line in f:
                      try:
                          event = json.loads(line)
                      except json.JSONDecodeError:
                          continue
                      if event.get('Action') != 'output':
                          continue
                      out = event.get('Output', '').strip()
                      if 'Benchmark' not in out or 'ns/op' not in out:
                          continue
                      import re
                      m = re.match(
                          r'Benchmark(\w+)-\d+\s+(\d+)\s+'
                          r'(\d+)\s+ns/op\s+(\d+)\s+B/op\s+'
                          r'(\d+)\s+allocs/op',
                          out
                      )
                      if m:
                          name = f'Benchmark{m.group(1)}'
                          results[name] = {
                              'iter': int(m.group(2)),
                              'ns': int(m.group(3)),
                              'b': int(m.group(4)),
                              'a': int(m.group(5)),
                          }
              return results

          # Parse all new benchmark files
          new = {}
          for f in glob.glob('benchmarks/bench-*.json'):
              new.update(parse_benchmarks(f))

          # Parse old benchmarks
          has_old = os.path.exists('bench_old.json')
          old = parse_benchmarks('bench_old.json') if has_old else {}

          lines = []
          lines.append('## 🚀 Benchmark Results\n')

          if not new:
              lines.append('> ⚠️ No benchmark results found.\n')
          elif not has_old:
              lines.append('> ⚠️ No previous benchmark. This is the baseline.\n')
              lines.append('| Benchmark | Iterations | ns/op | B/op | allocs/op |')
              lines.append('|-----------|------------|-------|------|-----------|')
              for name in sorted(new):
                  n = new[name]
                  lines.append(
                      f'| {name} '
                      f'| {n["iter"]:,} '
                      f'| {n["ns"]:,} '
                      f'| {n["b"]:,} '
                      f'| {n["a"]:,} |'
                  )
          else:
              lines.append('| Benchmark | Before | After | Change |')
              lines.append('|-----------|--------|-------|--------|')
              for name in sorted(new):
                  n = new[name]
                  if name in old:
                      o = old[name]
                      ns_d = (n['ns'] - o['ns']) / o['ns'] * 100
                      icon = '🟢' if ns_d <= 0 else '🔴'
                      lines.append(
                          f'| {name} '
                          f'| {o["ns"]:,} ns, {o["b"]:,} B, {o["a"]:,} allocs '
                          f'| {n["ns"]:,} ns, {n["b"]:,} B, {n["a"]:,} allocs '
                          f'| {icon} {ns_d:+.1f}% |'
                      )
                  else:
                      lines.append(
                          f'| {name} '
                          f'| - '
                          f'| {n["ns"]:,} ns, {n["b"]:,} B, {n["a"]:,} allocs '
                          f'| 🆕 |'
                      )
              for name in sorted(old):
                  if name not in new:
                      o = old[name]
                      lines.append(
                          f'| {name} '
                          f'| {o["ns"]:,} ns, {o["b"]:,} B, {o["a"]:,} allocs '
                          f'| - '
                          f'| ❌ |'
                      )

          with open('bench_report.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          PYEOF

      - name: Comment benchmarks on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('bench_report.md', 'utf8');
            const body = `## 🚀 Benchmark Results\n\n${report}`;

            const { data: comments } =
              await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

            const botComment = comments.find(
              (c) =>
                c.user.type === 'Bot' &&
                c.body.includes('🚀 Benchmark Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Update baseline on merge
        if: github.event.pull_request.merged == true
        run: |
          # Merge all benchmark files
          python3 << 'PYEOF'
          import json
          import glob

          merged = {}
          for f in glob.glob('benchmarks/bench-*.json'):
              with open(f, 'r') as fh:
                  for line in fh:
                      try:
                          event = json.loads(line)
                      except:
                          continue
                      if event.get('Action') == 'output' and 'ns/op' in event.get('Output', ''):
                          merged[event['Output'].strip()] = True

          with open('bench_old.json', 'w') as out:
              for line in merged:
                  out.write(json.dumps({'Action': 'output', 'Output': line + '\n'}) + '\n')
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add -f bench_old.json || true
          git commit -m "chore: update benchmark baseline [skip ci]" || true
          git push || true
